# speckit-linear — per-consumer-repo configuration template
#
# Role: declares everything the bridge needs to talk to one Linear
# workspace+team+project from one consumer repo. Lives at
# `.specify/extensions/linear/linear-config.yml` in the consumer repo.
#
# Install path: `specify extension add linear` ships THIS file into
# `.specify/extensions/linear/config-template.yml` via copytree, but the
# CLI does NOT auto-rename it (recon: extension-shape-recon.md §1, §5
# Q1). Either the operator or `speckit.linear.install`'s first-run copy
# step renames `config-template.yml` → `linear-config.yml` and fills in
# the UUIDs. The seed step (`speckit.linear.seed`, FR-021/FR-032) then
# populates `linear.workflow_state_uuids`.
#
# Commit status: THIS FILE IS COMMITTED (FR-002, Principle V — repo is
# self-describing; clone + sync should "just work"). Secrets live in
# `local-config.yml` (gitignored) or env vars, never here.
#
# Hand-edit policy: `linear.*.id` (UUIDs) and `linear.workflow_state_uuids`
# come from `speckit.linear.install` / `speckit.linear.seed`. Do NOT
# edit by hand unless you know what you're doing — lookups are by UUID,
# never by name (FR-032), so a wrong UUID silently breaks sync.

schema_version: 1          # template schema; bump if shape changes
config_version: 1          # bump if operator hand-edits

# Linear binding — resolved at install time (FR-002).
linear:
  workspace:
    name: "OSH-INFRA"             # informational (display only)
    url_key: "osh-infra"          # informational (workspace URL slug)
  team:
    id: "00000000-0000-0000-0000-000000000000"   # Required (FR-002) — UUID is authoritative
    key: "OSH"                    # informational; not used for lookup
    name: "OSH-INFRA"             # informational
  project:
    id: "00000000-0000-0000-0000-000000000000"   # Required (FR-002) — UUID is authoritative
    name: "speckit-linear"        # informational (display only)
  # Workflow state UUIDs captured by the seed step (FR-021 + FR-032).
  # Keys are the canonical lifecycle-phase identifiers. Lookup is by
  # UUID, never by name — Linear UI renames are safe; deletion surfaces
  # as an explicit error.
  workflow_state_uuids:
    specifying:     "00000000-0000-0000-0000-000000000000"   # Required (FR-032)
    clarifying:     "00000000-0000-0000-0000-000000000000"   # Required (FR-032)
    planning:       "00000000-0000-0000-0000-000000000000"   # Required (FR-032)
    tasking:        "00000000-0000-0000-0000-000000000000"   # Required (FR-032)
    red_team:       "00000000-0000-0000-0000-000000000000"   # Required (FR-032)
    implementing:   "00000000-0000-0000-0000-000000000000"   # Required (FR-032)
    analyzing:      "00000000-0000-0000-0000-000000000000"   # Required (FR-032)
    ready_to_merge: "00000000-0000-0000-0000-000000000000"   # Required (FR-032)
    merged:         "00000000-0000-0000-0000-000000000000"   # Required (FR-032)

# Behavior toggles — operator-tweakable.
sync:
  enabled: true              # If false, /speckit-* hooks skip Linear writes;
                             # `speckit.linear.push` still works manually. (FR-031)
  idle_window_days: 30       # Days before repo's Project Status flips to "Paused"
                             # if no spec touched. 0 disables. (FR-002)
  emit_summary: true         # Print structured sync summary every run (FR-023).

# Webhook (Layer E) — populated by `speckit.linear.install` if opted in (FR-027).
webhook:
  installed: false                                       # flip true when YAML is committed
  workflow_path: ".github/workflows/speckit-linear-sync.yml"   # (FR-027)
  secret_name: "LINEAR_API_TOKEN"                        # GitHub repo secret name (FR-029)

# Local git hooks — populated by `speckit.linear.install` (FR-033).
# `.git/hooks/` is not versioned, so install is per-clone and re-runs
# under FR-018b's dependency-verification contract.
git_hooks:
  installed: false
  hooks:
    - post-checkout    # branch / worktree switch → reconcile
    - post-commit      # local commit may tick a task → reconcile
    - post-merge       # local merge → reconcile

# ---
# How to bootstrap (first install, fresh consumer repo):
#   1. `specify extension add linear`                 # copies this template
#   2. `cp config-template.yml linear-config.yml`     # rename for the bridge to find it
#   3. `/speckit-linear-install`                      # fills linear.{team,project}.id,
#                                                     # installs webhook + git hooks,
#                                                     # registers after_* hooks
#   4. `/speckit-linear-seed`                         # creates workflow states + labels,
#                                                     # fills workflow_state_uuids
#   5. Commit `linear-config.yml`. Sync is now live (FR-002, Principle V).
